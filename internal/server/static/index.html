<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>简传</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <h1>简传</h1>
          <p id="subtitle">输入访问码后即可上传或拉取文件</p>
        </div>
        <button id="logoutBtn" class="ghost hidden" type="button">退出</button>
      </section>

      <section id="loginView" class="login-panel">
        <form id="loginForm">
          <label for="codeInput">访问码</label>
          <div class="inline">
            <input id="codeInput" name="code" inputmode="numeric" autocomplete="one-time-code" placeholder="请输入 6 位访问码" />
            <button type="submit">进入</button>
          </div>
          <p id="loginError" class="error"></p>
        </form>
      </section>

      <section id="appView" class="hidden">
        <div id="dropZone" class="drop-zone">
          <input id="fileInput" type="file" multiple />
          <div>
            <strong>拖拽文件到这里</strong>
            <span>或点击选择文件上传</span>
          </div>
        </div>

        <div id="progressWrap" class="progress hidden">
          <div id="progressBar"></div>
        </div>

        <section class="file-section">
          <div class="section-title">
            <h2>文件列表</h2>
            <button id="refreshBtn" class="ghost" type="button">刷新</button>
          </div>
          <div id="emptyState" class="empty">还没有文件</div>
          <div id="fileList" class="file-list"></div>
        </section>
      </section>

      <div id="toast" class="toast hidden"></div>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
